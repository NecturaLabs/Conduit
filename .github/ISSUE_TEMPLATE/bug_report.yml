name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a bug report, please check the existing issues to avoid duplicates.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Conduit is affected?
      options:
        - Dashboard (web)
        - API server
        - Landing page
        - Android app
        - MCP server / agent integration
        - Docker / self-hosted setup
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in what's relevant.
      value: |
        - Conduit version / commit:
        - Browser (if web):
        - OS:
        - Deployment: self-hosted Docker / other
        - Agent: OpenCode / Claude Code / both
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant error messages, console output, or `docker logs conduit-server-1`.
      render: shell
