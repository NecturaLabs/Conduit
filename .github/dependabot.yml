version: 2
updates:
  # Bun monorepo — single entry at root handles all workspaces
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5

  # Docker (apps/server/Dockerfile)
  - package-ecosystem: "docker"
    directory: "/apps/server"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5

  # Docker (apps/web/Dockerfile.static)
  - package-ecosystem: "docker"
    directory: "/apps/web"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
